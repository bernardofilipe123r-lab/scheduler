<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <title>Viral App</title>
    <style>
      /* Pre-React loading screen — visible instantly, hidden once React mounts */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1c1917 50%, #292524 100%);
        gap: 44px;
        transition: opacity 0.55s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.55s;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* ── Logo container ── */
      #preloader .logo-wrap {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pl-entrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      /* Radial glow behind the logo icon */
      #preloader .glow {
        position: absolute;
        top: -6px; right: -6px; bottom: -6px; left: -6px;
        border-radius: 32px;
        background: radial-gradient(circle at center, rgba(0,67,92,0.38) 0%, transparent 68%);
        animation: pl-glow 2.6s ease-in-out infinite;
      }

      /* Inner spinning arc */
      #preloader .ring {
        position: absolute;
        top: -15px; right: -15px; bottom: -15px; left: -15px;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-top-color: #00435c;
        border-right-color: rgba(0, 67, 92, 0.32);
        animation: pl-spin 1.65s linear infinite;
      }

      /* Outer counter-spinning arc */
      #preloader .ring-outer {
        position: absolute;
        top: -27px; right: -27px; bottom: -27px; left: -27px;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top-color: rgba(0, 67, 92, 0.42);
        border-bottom-color: rgba(0, 67, 92, 0.14);
        animation: pl-spin 3.2s linear infinite reverse;
      }

      /* ── Three bouncing dots ── */
      #preloader .dots {
        display: flex;
        gap: 7px;
      }
      #preloader .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #00435c;
        animation: pl-dot 1.4s ease-in-out infinite;
      }
      #preloader .dot:nth-child(2) { animation-delay: 0.22s; }
      #preloader .dot:nth-child(3) { animation-delay: 0.44s; }

      /* ── Keyframes ── */
      @keyframes pl-entrance {
        from { transform: scale(0.72); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
      }
      @keyframes pl-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pl-glow {
        0%, 100% { opacity: 0.45; }
        50%      { opacity: 0.9;  }
      }
      @keyframes pl-dot {
        0%, 80%, 100% { transform: scale(0.45); opacity: 0.3;  }
        40%           { transform: scale(1);    opacity: 1;    }
      }
    </style>
  </head>
  <body>
    <!-- Pre-React loading screen -->
    <div id="preloader" aria-label="Loading application">
      <div class="logo-wrap">
        <div class="glow"></div>
        <div class="ring-outer"></div>
        <div class="ring"></div>
        <svg width="80" height="80" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="8" width="112" height="112" rx="28" fill="#F5EDD8"/>
          <path d="M29 34L48 94H61L42 34H29Z" fill="#1A1A1A"/>
          <path d="M67 94H80L99 34H86L73.5 73.5L61 34H48L67 94Z" fill="#1A1A1A"/>
          <circle cx="99" cy="29" r="7" fill="#1A1A1A" fill-opacity="0.25"/>
          <circle cx="107" cy="40" r="3" fill="#1A1A1A" fill-opacity="0.18"/>
        </svg>
      </div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
