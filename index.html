<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    <title>Viral App</title>
    <style>
      /* Pre-React loading screen — visible instantly, hidden once React mounts */
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0a 0%, #1c1917 50%, #292524 100%);
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #preloader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #preloader .logo-wrap {
        width: 64px;
        height: 64px;
        animation: pl-breathe 2s ease-in-out infinite;
      }
      #preloader .bar-track {
        width: 160px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255,255,255,0.08);
        margin-top: 32px;
        overflow: hidden;
      }
      #preloader .bar-fill {
        width: 40%;
        height: 100%;
        border-radius: 3px;
        background: #00435c;
        animation: pl-slide 1.2s ease-in-out infinite;
      }
      @keyframes pl-breathe {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50%      { transform: scale(1.06); opacity: 1; }
      }
      @keyframes pl-slide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(200%); }
        100% { transform: translateX(400%); }
      }
    </style>
  </head>
  <body>
    <!-- Pre-React loading screen -->
    <div id="preloader" aria-label="Loading application">
      <div class="logo-wrap">
        <svg width="64" height="64" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="8" width="112" height="112" rx="28" fill="#F5EDD8"/>
          <path d="M29 34L48 94H61L42 34H29Z" fill="#1A1A1A"/>
          <path d="M67 94H80L99 34H86L73.5 73.5L61 34H48L67 94Z" fill="#1A1A1A"/>
          <circle cx="99" cy="29" r="7" fill="#1A1A1A" fill-opacity="0.25"/>
          <circle cx="107" cy="40" r="3" fill="#1A1A1A" fill-opacity="0.18"/>
        </svg>
      </div>
      <div class="bar-track"><div class="bar-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
